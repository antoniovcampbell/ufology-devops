name: Deploy Pipeline with Tests

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Executar testes
      run: mvn clean test
    
    - name: Publicar relatório de testes
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Resultados dos Testes
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Build da aplicação
      run: mvn clean package -DskipTests
    
    - name: Simular Deploy
      run: |
        echo "::group::Informações de Deploy"
        echo "Tag/Versão: ${GITHUB_REF#refs/tags/}"
        echo "Commit SHA: $GITHUB_SHA"
        echo "Actor: $GITHUB_ACTOR"
        echo "Repositório: $GITHUB_REPOSITORY"
        echo "::endgroup::"
        
        echo "::notice::Iniciando deploy para produção..."
        sleep 2
        
        JAR_FILE=$(find target -name "*.jar" | head -n 1)
        if [ -n "$JAR_FILE" ]; then
          echo "::notice::Deploy do arquivo $JAR_FILE concluído com sucesso!"
        else
          echo "::error::Nenhum arquivo JAR encontrado para deploy"
          exit 1
        fi
    
    - name: Verificação pós-deploy
      run: |
        echo "::group::Verificações de Saúde"
        echo "✓ Aplicação deployada"
        echo "✓ Serviço iniciado"
        echo "✓ Health check passou"
        echo "::endgroup::"
        
        echo "::notice::Deploy finalizado com sucesso!"